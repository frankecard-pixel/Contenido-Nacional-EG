    <script>
        // Apply appearance settings on load
        (function() {
            const fontSize = localStorage.getItem('fontSize') || 'medium';
            const layoutWidth = localStorage.getItem('layoutWidth') || 'standard';
            const menuSize = localStorage.getItem('menuSize') || 'standard';
            const chartSize = localStorage.getItem('chartSize') || 'medium';
            
            document.documentElement.setAttribute('data-font-size', fontSize);
            document.documentElement.setAttribute('data-layout-width', layoutWidth);
            document.documentElement.setAttribute('data-menu-size', menuSize);
            document.documentElement.setAttribute('data-chart-size', chartSize);

            if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>
